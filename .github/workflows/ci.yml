name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.14"]

    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v7
        with:
          version: "0.11.25"
          enable-cache: true

      - name: Install Python
        run: uv python install ${{ matrix.python-version }}

      - name: Install locked dependencies
        run: uv sync --locked --python ${{ matrix.python-version }}

      - name: Test
        run: uv run pytest -q

      - name: Build distributions
        if: matrix.python-version == '3.14'
        run: uv build

      - name: Test installed wheel
        if: matrix.python-version == '3.14'
        run: |
          uv run --isolated --no-project --with ./dist/*.whl python -c "import uniprotpy; print(uniprotpy.__version__)"
          uv run --isolated --no-project --with ./dist/*.whl uniprotpy --help
