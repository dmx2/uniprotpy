name: Publish to PyPI

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v7
        with:
          version: "0.11.25"
          enable-cache: true

      - name: Install Python
        run: uv python install 3.14

      - name: Install locked dependencies
        run: uv sync --locked --python 3.14

      - name: Verify release tag
        run: test "$GITHUB_REF_NAME" = "v$(uv run python -c 'from uniprotpy.version import __version__; print(__version__)')"

      - name: Test
        run: uv run pytest -q

      - name: Build distributions
        run: uv build

      - name: Check distributions
        run: uvx twine check dist/*

      - name: Test installed wheel
        run: |
          uv run --isolated --no-project --with ./dist/*.whl python -c "import uniprotpy; print(uniprotpy.__version__)"
          uv run --isolated --no-project --with ./dist/*.whl uniprotpy --help

      - name: Publish distributions
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        run: uv publish --trusted-publishing never dist/*
